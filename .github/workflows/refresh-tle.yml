name: Refresh TLE snapshots

# Fetches CelesTrak feeds once an hour from GitHub's runners (not from visitors
# or the edge), so the public site never triggers CelesTrak's per-IP rate limit.
# Snapshots are committed to /snapshots and served by the proxy.

on:
  schedule:
    - cron: "17 * * * *" # hourly at :17
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-tle
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch CelesTrak groups
        run: |
          mkdir -p snapshots
          UA="satellite-globe-hackathon/1.0 (+https://github.com/PeanutButte7/satellite-globe-proxy)"
          for g in active stations starlink oneweb gps-ops galileo science weather geo cubesat; do
            echo "Fetching $g"
            code=$(curl -sS -A "$UA" -w '%{http_code}' \
              "https://celestrak.org/NORAD/elements/gp.php?GROUP=$g&FORMAT=tle" \
              -o "snapshots/$g.tle.new" || echo "000")
            size=$(wc -c < "snapshots/$g.tle.new" 2>/dev/null || echo 0)
            # Only replace if real TLE data (guards against 403 pages / "no data" replies).
            if [ "$code" = "200" ] && [ "$size" -gt 1000 ] && grep -q '^1 ' "snapshots/$g.tle.new"; then
              mv "snapshots/$g.tle.new" "snapshots/$g.tle"
              echo "  ok: $size bytes"
            else
              echo "  skip: code=$code size=$size"
              rm -f "snapshots/$g.tle.new"
            fi
            sleep 8
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh TLE snapshots [skip ci]"
            git push
          fi

      - name: Purge jsDelivr cache
        if: always()
        run: |
          for g in active stations starlink oneweb gps-ops galileo science weather geo cubesat; do
            curl -fsS "https://purge.jsdelivr.net/gh/PeanutButte7/satellite-globe-proxy@main/snapshots/$g.tle" >/dev/null || true
          done
